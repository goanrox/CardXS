<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>CardXS</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F9FAFB" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service Worker handling for stale cache issues
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Unregister any existing service workers to clear stale caches
          // especially if they are using a cache-first strategy that causes white-screens
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) {
              registration.unregister();
              console.log('[SW] Unregistered stale service worker');
            }
          });

          // Clear all caches
          if (window.caches) {
            caches.keys().then(names => {
              for (let name of names) {
                caches.delete(name);
                console.log('[Cache] Deleted stale cache:', name);
              }
            });
          }
        });
      }
      
      // Log app info for debugging
      console.log('[App] Environment: ' + (window.location.hostname === 'localhost' ? 'development' : 'production'));
    </script>
  </body>
</html>
